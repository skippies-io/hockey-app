<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hockey for Juniors — API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.9.4/swagger-ui.css"
        integrity="sha384-OBu+J/M+QcAaDTAfm06fv450JibV8q+vvmdXv0lvRomU6/66bIgEOQ1txp3ctpuX"
        crossorigin="anonymous" />
  <style>
    body { margin: 0; }
    .topbar { display: none; } /* hide Swagger branding bar */
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.4/swagger-ui-bundle.js"
          integrity="sha384-RV2ZdZQ2LIrY8f3kipQ9H0zLnmyxL8ULv9TsBda4GHvNKe1tFFnkSko1EyLVwjYt"
          crossorigin="anonymous"></script>
  <script>
    SwaggerUIBundle({
      url: './openapi.yaml',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      tryItOutEnabled: true,
    });
  </script>
</body>
</html>
