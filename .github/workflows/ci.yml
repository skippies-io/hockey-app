name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Guardrail - block Apps Script references
        run: scripts/ci/no-apps-script.sh

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Rebuild required native deps
        run: npm rebuild esbuild

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

      - name: Build
        run: npm run build
        env:
          VITE_DB_API_BASE: ${{ vars.PROD_API_BASE }}/api

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist
          retention-days: 1

      - name: Validate truth snapshots
        run: |
          node scripts/truth/validateSnapshot.mjs specs/fixtures
