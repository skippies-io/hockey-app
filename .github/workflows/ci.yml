name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Guardrail - block Apps Script references
        run: scripts/ci/no-apps-script.sh

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Rebuild required native deps
        run: npm rebuild esbuild

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

      - name: Build
        run: npm run build
        env:
          VITE_DB_API_BASE: ${{ vars.PROD_API_BASE }}/api

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist
          retention-days: 1

      - name: Validate truth snapshots
        run: |
          node scripts/truth/validateSnapshot.mjs specs/fixtures

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Rebuild required native deps
        run: npm rebuild esbuild

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build (E2E — local API base)
        run: npm run build:e2e

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual regression (Playwright)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Rebuild required native deps
        run: npm rebuild esbuild

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build (visual — local API base)
        run: npm run build:e2e

      - name: Run visual tests (generate missing baselines, detect regressions)
        run: |
          npm run test:visual:update
          # Any snapshot that was MODIFIED (not just newly created) is a regression.
          CHANGED=$(git diff --name-only e2e/snapshots/ | wc -l | tr -d ' ')
          if [ "$CHANGED" -gt "0" ]; then
            echo "::error::Visual regression detected — $CHANGED snapshot(s) changed:"
            git diff --stat e2e/snapshots/
            exit 1
          fi

      - name: Commit new baselines to branch
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add visual regression baselines [skip ci]"
          file_pattern: "e2e/snapshots/**"

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: visual-diffs
          path: playwright-report/
          retention-days: 7
