name: SonarCloud Code Analysis

on:
  pull_request:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      # PR path: standard checkout of the PR branch
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      # workflow_run path: checkout the exact commit CI tested
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # PR path: detect whether this PR changes app/runtime code.
      - name: Detect app changes
        if: github.event_name == 'pull_request'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "Changed files:"; echo "$files"

          if echo "$files" | grep -Eq '^(src/|server/|scripts/|db/|e2e/|public/|index\.html$|package\.json$|package-lock\.json$|vite\.config\.|playwright\.config\.|\.storybook/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: github.event_name == 'pull_request' && steps.changes.outputs.code == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (no lifecycle scripts)
        if: github.event_name == 'pull_request' && steps.changes.outputs.code == 'true'
        run: npm ci --ignore-scripts

      - name: Rebuild required native deps
        if: github.event_name == 'pull_request' && steps.changes.outputs.code == 'true'
        run: npm rebuild esbuild

      - name: Test (coverage)
        if: github.event_name == 'pull_request' && steps.changes.outputs.code == 'true'
        run: npm run test:coverage

      - name: Skip Sonar (docs-only)
        if: github.event_name == 'pull_request' && steps.changes.outputs.code != 'true'
        run: echo "Docs-only change detected — skipping SonarCloud coverage run."

      # workflow_run path: reuse coverage artifact from CI
      - name: Download coverage artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: coverage-report
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Sonar context
        if: github.event_name == 'workflow_run'
        run: |
          echo "sonar.scm.revision=${{ github.event.workflow_run.head_sha }}" >> sonar-project.properties
          echo "sonar.branch.name=${{ github.event.workflow_run.head_branch }}" >> sonar-project.properties

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
