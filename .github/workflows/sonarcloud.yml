name: SonarCloud Code Analysis

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: coverage-report
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Sonar context
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          echo "sonar.scm.revision=${{ github.event.workflow_run.head_sha }}" >> sonar-project.properties
          if [ -n "$PR_NUMBER" ]; then
            echo "sonar.pullrequest.key=$PR_NUMBER" >> sonar-project.properties
            echo "sonar.pullrequest.branch=${{ github.event.workflow_run.pull_requests[0].head.ref }}" >> sonar-project.properties
            echo "sonar.pullrequest.base=${{ github.event.workflow_run.pull_requests[0].base.ref }}" >> sonar-project.properties
          else
            echo "sonar.branch.name=${{ github.event.workflow_run.head_branch }}" >> sonar-project.properties
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
