name: Deploy to Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-deploy:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Determine whether this PR contains any non-doc changes.
      # If it's docs-only, we skip deploy (SSH is locked down) but still succeed the required check.
      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "Changed files:"; echo "$files"

          # Deploy only when application/runtime code changes.
          if echo "$files" | grep -Eq '^(src/|server/|scripts/|db/|e2e/|public/|index\.html$|package\.json$|package-lock\.json$|vite\.config\.|playwright\.config\.|\.storybook/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: npm ci --ignore-scripts

      - name: Rebuild esbuild
        if: steps.changes.outputs.code == 'true'
        run: npm rebuild esbuild

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: npm run build
        env:
          VITE_PROVIDER: db
          VITE_DB_API_BASE: https://hockey-app.aetherarc.co.za/api
          VITE_BASE_PATH: /

      - name: Connect runner to Tailscale (for staging deploy)
        if: steps.changes.outputs.code == 'true'
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.STAGING_TAILSCALE_AUTHKEY }}

      - name: Deploy to staging VPS (via Tailscale)
        if: steps.changes.outputs.code == 'true'
        uses: appleboy/scp-action@master
        with:
          # Use tailnet hostname to avoid public SSH.
          host: srv1362771.tail22ccf5.ts.net
          username: aether
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/hockey-app"
          strip_components: 1

      - name: Comment PR with staging URL
        if: steps.changes.outputs.code == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Staging deployment successful!\n\n🔗 **[View on Staging](https://hockey-app.aetherarc.co.za/admin)**\n\nAdmin console is ready for testing. Changes to this PR will auto-deploy.'
            })

      - name: Skip deploy (docs-only)
        if: steps.changes.outputs.code != 'true'
        run: echo "Docs-only change detected — skipping staging deploy."
